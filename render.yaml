# Render blueprint for ProofMark: managed Postgres + API (Node) + web (static Vite build).
databases:
  - name: proofmark-db
    plan: free

services:
  - type: web
    name: proofmark-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase: { name: proofmark-db, property: connectionString }
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FPWM_BASE_URL
        value: https://watermarking-engine.onrender.com
      - key: FPWM_API_KEY
        sync: false
      - key: FPWM_IMAGE_ENGINE
        value: qim-dct
      - key: FPWM_VIDEO_ENGINE
        value: qim-dct
      - key: FPWM_MAX_PAYLOAD
        value: "268435455"
      - key: FPWM_VIDEO_JOB_TIMEOUT_MS
        value: "120000"
      - key: FPWM_VIDEO_STATUS_TIMEOUT_MS
        value: "60000"
      - key: MAX_VIDEO_UPLOAD_MB
        value: "250"
      - key: MAX_VERIFY_VIDEO_UPLOAD_MB
        value: "250"
      - key: CLIENT_URL
        sync: false

  - type: web
    name: proofmark-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
